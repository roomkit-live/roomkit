<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RoomKit Voice Agent</title>
<!--
  RoomKit modern voice agent UI.

  Supports two connection modes:
    1. WebSocket (FastRTCVoiceBackend) — for STT/TTS pipeline
    2. WebRTC  (FastRTCRealtimeTransport) — for speech-to-speech AI

  Usage:
    Open this file in a browser and configure via the settings gear.
    Or serve it from a FastAPI app alongside the voice endpoint.
-->
<style>
  :root {
    --bg-start: #0a0a1a;
    --bg-end: #1a1a2e;
    --accent: #00d4ff;
    --accent-glow: rgba(0, 212, 255, 0.35);
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-hover: rgba(255, 255, 255, 0.1);
    --text-primary: rgba(255, 255, 255, 0.92);
    --text-secondary: rgba(255, 255, 255, 0.55);
    --text-dim: rgba(255, 255, 255, 0.3);
    --user-bg: rgba(0, 212, 255, 0.08);
    --user-border: rgba(0, 212, 255, 0.3);
    --assistant-bg: rgba(255, 255, 255, 0.06);
    --assistant-border: rgba(255, 255, 255, 0.1);
    --btn-size: 52px;
    --radius: 16px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ── Visualizer ─────────────────────────────────────────────── */
  .visualizer-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    padding: 2.5rem 0 1rem;
  }

  .bars {
    display: flex;
    align-items: center;
    gap: 5px;
    height: 80px;
  }

  .bar {
    width: 6px;
    border-radius: 3px;
    background: var(--accent);
    height: 8px;
    transition: height 60ms ease-out, opacity 0.3s;
    opacity: 0.7;
  }

  /* Idle: gentle pulse */
  .state-disconnected .bar,
  .state-connecting .bar {
    animation: idle-pulse 2s ease-in-out infinite;
  }
  .state-disconnected .bar:nth-child(1) { animation-delay: 0s; }
  .state-disconnected .bar:nth-child(2) { animation-delay: 0.15s; }
  .state-disconnected .bar:nth-child(3) { animation-delay: 0.3s; }
  .state-disconnected .bar:nth-child(4) { animation-delay: 0.45s; }
  .state-disconnected .bar:nth-child(5) { animation-delay: 0.3s; }
  .state-disconnected .bar:nth-child(6) { animation-delay: 0.15s; }
  .state-disconnected .bar:nth-child(7) { animation-delay: 0s; }
  .state-connecting .bar:nth-child(1) { animation-delay: 0s; }
  .state-connecting .bar:nth-child(2) { animation-delay: 0.15s; }
  .state-connecting .bar:nth-child(3) { animation-delay: 0.3s; }
  .state-connecting .bar:nth-child(4) { animation-delay: 0.45s; }
  .state-connecting .bar:nth-child(5) { animation-delay: 0.3s; }
  .state-connecting .bar:nth-child(6) { animation-delay: 0.15s; }
  .state-connecting .bar:nth-child(7) { animation-delay: 0s; }

  @keyframes idle-pulse {
    0%, 100% { height: 8px; opacity: 0.4; }
    50% { height: 20px; opacity: 0.7; }
  }

  /* Thinking: sequential bounce */
  .state-thinking .bar {
    animation: thinking-bounce 1s ease-in-out infinite;
  }
  .state-thinking .bar:nth-child(1) { animation-delay: 0s; }
  .state-thinking .bar:nth-child(2) { animation-delay: 0.08s; }
  .state-thinking .bar:nth-child(3) { animation-delay: 0.16s; }
  .state-thinking .bar:nth-child(4) { animation-delay: 0.24s; }
  .state-thinking .bar:nth-child(5) { animation-delay: 0.32s; }
  .state-thinking .bar:nth-child(6) { animation-delay: 0.4s; }
  .state-thinking .bar:nth-child(7) { animation-delay: 0.48s; }

  @keyframes thinking-bounce {
    0%, 100% { height: 8px; opacity: 0.5; }
    30% { height: 50px; opacity: 1; }
  }

  /* Listening / Speaking: bars driven by JS, disable CSS animation */
  .state-listening .bar,
  .state-speaking .bar {
    animation: none;
    opacity: 1;
  }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .state-listening .pulse-dot,
  .state-speaking .pulse-dot,
  .state-thinking .pulse-dot {
    opacity: 1;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.4; }
  }

  /* ── Transcript card ────────────────────────────────────────── */
  .transcript-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 1rem;
    min-height: 200px;
    max-height: 340px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }

  .transcript-card::-webkit-scrollbar { width: 4px; }
  .transcript-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .transcript-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 160px;
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
  }

  .bubble {
    max-width: 85%;
    padding: 0.6rem 0.9rem;
    border-radius: var(--radius-sm);
    font-size: 0.88rem;
    line-height: 1.5;
    animation: slideIn 0.25s ease-out;
    word-wrap: break-word;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble-user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    color: var(--text-primary);
  }

  .bubble-assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border: 1px solid var(--assistant-border);
    color: var(--text-primary);
  }

  .bubble-other {
    align-self: flex-start;
    background: rgba(139, 92, 246, 0.08);
    border: 1px solid rgba(139, 92, 246, 0.25);
    color: var(--text-primary);
  }

  .bubble-system {
    align-self: center;
    color: var(--text-dim);
    font-size: 0.78rem;
    padding: 0.25rem 0;
    animation: none;
  }

  .bubble-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.2rem;
    opacity: 0.6;
  }

  .bubble-interim {
    opacity: 0.55;
    font-style: italic;
  }

  /* ── Controls ───────────────────────────────────────────────── */
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    padding: 0.5rem 0;
  }

  .ctrl-btn {
    width: var(--btn-size);
    height: var(--btn-size);
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .ctrl-btn:hover:not(:disabled) {
    background: var(--glass-hover);
    border-color: rgba(255, 255, 255, 0.15);
  }

  .ctrl-btn:disabled {
    opacity: 0.25;
    cursor: default;
  }

  .ctrl-btn svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }

  .ctrl-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg-start);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .ctrl-btn.danger {
    border-color: rgba(255, 60, 60, 0.3);
  }
  .ctrl-btn.danger:hover:not(:disabled) {
    background: rgba(255, 60, 60, 0.15);
    border-color: rgba(255, 60, 60, 0.4);
  }

  .ctrl-btn.mute {
    border-color: rgba(255, 165, 0, 0.3);
  }
  .ctrl-btn.mute.muted {
    background: rgba(255, 60, 60, 0.2);
    border-color: rgba(255, 60, 60, 0.5);
  }
  .ctrl-btn.mute.muted svg .slash { display: block; }
  .ctrl-btn.mute svg .slash { display: none; }

  .ctrl-btn.settings-btn {
    width: 40px;
    height: 40px;
  }
  .ctrl-btn.settings-btn svg { width: 18px; height: 18px; }

  /* ── Settings popover ───────────────────────────────────────── */
  .settings-popover {
    display: none;
    background: var(--glass-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 1.25rem;
    animation: fadeIn 0.2s ease-out;
  }

  .settings-popover.open { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .settings-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .field { margin-bottom: 0.75rem; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.3rem;
  }

  .field input, .field select {
    width: 100%;
    padding: 0.55rem 0.75rem;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: rgba(0, 212, 255, 0.4);
  }

  .field select option { background: #1a1a2e; color: white; }

  .field-row { display: flex; gap: 0.75rem; }
  .field-row > .field { flex: 1; }
</style>
</head>
<body>

<div class="container state-disconnected" id="app">

  <!-- Visualizer -->
  <div class="visualizer-area">
    <div class="bars" id="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="state-indicator">
      <span class="pulse-dot"></span>
      <span id="state-text">Ready to connect</span>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript-card" id="transcript">
    <div class="transcript-empty" id="transcript-empty">
      Tap the microphone to start a conversation
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" id="btn-mic" onclick="toggleConnection()" title="Connect microphone">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="ctrl-btn mute" id="btn-mute" onclick="toggleMute()" disabled title="Mute/unmute microphone">
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        <line class="slash" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="ctrl-btn danger" id="btn-end" onclick="disconnect()" disabled title="End session">
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
    <button class="ctrl-btn settings-btn" id="btn-settings" onclick="toggleSettings()" title="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
  </div>

  <!-- Settings -->
  <div class="settings-popover" id="settings">
    <div class="settings-title">Connection Settings</div>
    <div class="field">
      <label for="server-url">Server URL</label>
      <input id="server-url" type="text" value="http://localhost:8000" placeholder="http://localhost:8000">
    </div>
    <div class="field">
      <label for="mode">Transport</label>
      <select id="mode">
        <option value="webrtc">WebRTC (speech-to-speech)</option>
        <option value="websocket">WebSocket (STT/TTS pipeline)</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="ws-path">WS endpoint</label>
        <input id="ws-path" type="text" value="/voice">
      </div>
      <div class="field">
        <label for="rtc-path">WebRTC endpoint</label>
        <input id="rtc-path" type="text" value="/rtc-realtime">
      </div>
    </div>
  </div>

</div>

<script>
// ─── State machine ──────────────────────────────────────────────────────
const STATES = {
  disconnected: 'Ready to connect',
  connecting:   'Connecting...',
  listening:    'Listening...',
  thinking:     'Thinking...',
  speaking:     'Speaking...',
};

let currentState = 'disconnected';

function setState(state) {
  currentState = state;
  const app = document.getElementById('app');
  // Remove all state classes, add new one
  app.className = 'container state-' + state;
  document.getElementById('state-text').textContent = STATES[state] || state;

  const btnMic = document.getElementById('btn-mic');
  const btnEnd = document.getElementById('btn-end');
  const btnMute = document.getElementById('btn-mute');

  if (state === 'disconnected') {
    btnMic.disabled = false;
    btnMic.classList.remove('active');
    btnEnd.disabled = true;
    btnMute.disabled = true;
    btnMute.classList.remove('muted');
  } else {
    btnMic.disabled = true;
    btnMic.classList.add('active');
    btnEnd.disabled = false;
    btnMute.disabled = false;
  }
}

// ─── Connection state ───────────────────────────────────────────────────
let ws = null;
let pc = null;
let dc = null;
let audioCtx = null;
let micStream = null;
let processor = null;
let nextPlayTime = 0;
let micAnalyser = null;
let micAnalyserStream = null;
let agentAnalyser = null;
let agentGain = null;
let speakingTimeout = null;
let animFrameId = null;

// ─── Settings toggle ────────────────────────────────────────────────────
function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

// ─── Connect / Disconnect ───────────────────────────────────────────────
function toggleConnection() {
  if (currentState === 'disconnected') connect();
}

function toggleMute() {
  if (!micStream) return;
  const btn = document.getElementById('btn-mute');
  const tracks = micStream.getAudioTracks();
  const muted = tracks[0]?.enabled !== false;
  tracks.forEach(t => { t.enabled = !muted; });
  btn.classList.toggle('muted', muted);
  btn.title = muted ? 'Unmute microphone' : 'Mute microphone';
}

async function connect() {
  const mode = document.getElementById('mode').value;
  setState('connecting');
  // Close settings on connect
  document.getElementById('settings').classList.remove('open');

  try {
    audioCtx = new AudioContext({ sampleRate: 48000 });
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    nextPlayTime = 0;

    // Create agent analyser for output visualization
    agentAnalyser = audioCtx.createAnalyser();
    agentAnalyser.fftSize = 64;
    agentGain = audioCtx.createGain();
    agentGain.gain.value = 1;
    agentGain.connect(agentAnalyser);
    agentAnalyser.connect(audioCtx.destination);

    if (mode === 'websocket') await connectWebSocket();
    else await connectWebRTC();

    startVisualizerLoop();
  } catch (err) {
    addBubble('Connection failed: ' + err.message, 'system');
    doDisconnect();
  }
}

function disconnect() {
  doDisconnect();
}

function doDisconnect() {
  if (ws) { ws.close(); ws = null; }
  if (pc) { pc.close(); pc = null; }
  dc = null;
  if (processor) { processor.disconnect(); processor = null; }
  if (micAnalyserStream) { micAnalyserStream.getTracks().forEach(t => t.stop()); micAnalyserStream = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx && audioCtx.state !== 'closed') audioCtx.close().catch(() => {});
  audioCtx = null;
  micAnalyser = null;
  agentAnalyser = null;
  agentGain = null;
  if (speakingTimeout) { clearTimeout(speakingTimeout); speakingTimeout = null; }
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  setState('disconnected');
}

// ─── Mu-law codec ───────────────────────────────────────────────────────
const MULAW_BIAS = 0x84, MULAW_CLIP = 32635;

function encodeMulaw(sample) {
  const sign = sample >= 0 ? 0x80 : 0x00;
  let mag = Math.min(Math.abs(sample), MULAW_CLIP) + MULAW_BIAS;
  let exp = 7, mask = 0x4000;
  while (exp > 0 && !(mag & mask)) { exp--; mask >>= 1; }
  const mantissa = (mag >> (exp + 3)) & 0x0F;
  return (~((exp << 4) | mantissa) & 0x7F) | sign;
}

const MULAW_DECODE = new Int16Array(256);
(function() {
  for (let i = 0; i < 256; i++) {
    const v = ~i;
    const sign = v & 0x80;
    const exp = (v >> 4) & 0x07;
    const mantissa = v & 0x0F;
    let sample = ((mantissa << 3) + MULAW_BIAS) << exp;
    sample -= MULAW_BIAS;
    MULAW_DECODE[i] = sign ? sample : -sample;
  }
})();

function pcmToMulaw(pcm16) {
  const out = new Uint8Array(pcm16.length);
  for (let i = 0; i < pcm16.length; i++) out[i] = encodeMulaw(pcm16[i]);
  return out;
}

function mulawToPcm(mulaw) {
  const pcm = new Int16Array(mulaw.length);
  for (let i = 0; i < mulaw.length; i++) pcm[i] = MULAW_DECODE[mulaw[i]];
  return pcm;
}

// ─── Audio playback ─────────────────────────────────────────────────────
function playAudio(float32, sampleRate) {
  if (!audioCtx || audioCtx.state === 'closed') return;
  const buffer = audioCtx.createBuffer(1, float32.length, sampleRate);
  buffer.getChannelData(0).set(float32);
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  // Route through agent analyser for visualization
  src.connect(agentGain);

  const now = audioCtx.currentTime;
  if (nextPlayTime < now) nextPlayTime = now;
  src.start(nextPlayTime);
  nextPlayTime += buffer.duration;

  // Track speaking state
  if (currentState === 'thinking' || currentState === 'listening') {
    setState('speaking');
  }
  resetSpeakingTimeout();
}

function resetSpeakingTimeout() {
  if (speakingTimeout) clearTimeout(speakingTimeout);
  speakingTimeout = setTimeout(() => {
    if (currentState === 'speaking') setState('listening');
  }, 600);
}

function clearAudioQueue() {
  // Reset playback time to stop queued audio
  nextPlayTime = 0;
  finalizeAssistantBubble();
  if (currentState === 'speaking') setState('listening');
}

// ─── Unified message handler ────────────────────────────────────────────
function handleServerMessage(data) {
  // Transcription: normalize both WS and WebRTC formats
  if (data.type === 'transcription') {
    // WS format: { type: "transcription", data: { text, role } }
    // WebRTC format: { type: "transcription", text, role, is_final }
    const text = data.data?.text || data.text;
    const role = data.data?.role || data.role || 'user';
    const isFinal = data.is_final !== undefined ? data.is_final : true;

    if (!text) return;

    if (role === 'assistant_interim' || role === 'assistant') {
      if (isFinal) {
        // Final has the full concatenated text — replace everything
        setAssistantText(text);
      } else {
        // Non-final are individual chunks — accumulate
        appendAssistantChunk(text);
      }
    } else if (role === 'user') {
      // User transcription — always update same bubble, finalize on is_final
      finalizeAssistantBubble();
      updateUserInterim(text);
      if (isFinal) {
        finalizeUserBubble();
        if (currentState === 'listening') setState('thinking');
      }
    } else {
      // Other participant transcription (bridge mode)
      finalizeAssistantBubble();
      finalizeUserBubble();
      addBubble(text, 'other', role);
    }
    return;
  }

  // Audio via data channel (mu-law)
  if (data.event === 'media' && data.media?.payload) {
    const raw = atob(data.media.payload);
    const mulaw = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) mulaw[i] = raw.charCodeAt(i);
    const pcm = mulawToPcm(mulaw);
    const f32 = new Float32Array(pcm.length);
    for (let i = 0; i < pcm.length; i++) f32[i] = pcm[i] / 32768;
    playAudio(f32, 24000);
    return;
  }

  // Speaking indicator from server
  if (data.type === 'speaking') {
    if (currentState !== 'speaking') setState('speaking');
    return;
  }

  // Clear audio (barge-in)
  if (data.type === 'clear_audio') {
    clearAudioQueue();
    return;
  }
}

// ─── WebSocket mode ─────────────────────────────────────────────────────
async function connectWebSocket() {
  const base = document.getElementById('server-url').value.replace(/\/$/, '');
  const path = document.getElementById('ws-path').value;
  const proto = base.startsWith('https') ? 'wss:' : 'ws:';
  const host = base.replace(/^https?:\/\//, '');
  const wsUrl = `${proto}//${host}${path}/websocket/offer`;
  const wsId = crypto.randomUUID?.() || Math.random().toString(36).substring(2, 10);

  return new Promise((resolve, reject) => {
    ws = new WebSocket(wsUrl);

    ws.onopen = async () => {
      ws.send(JSON.stringify({ event: 'start', websocket_id: wsId }));

      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        addBubble('Microphone access denied', 'system');
        doDisconnect();
        reject(err);
        return;
      }

      const source = audioCtx.createMediaStreamSource(micStream);

      // Mic analyser for visualization
      micAnalyser = audioCtx.createAnalyser();
      micAnalyser.fftSize = 64;
      source.connect(micAnalyser);

      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const f32 = e.inputBuffer.getChannelData(0);
        const pcm16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++)
          pcm16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32767)));
        const mulaw = pcmToMulaw(pcm16);
        const b64 = btoa(String.fromCharCode.apply(null, mulaw));
        ws.send(JSON.stringify({ event: 'media', media: { payload: b64 } }));
      };

      source.connect(processor);
      processor.connect(audioCtx.destination);

      setState('listening');
      resolve();
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      } catch { /* ignore non-JSON */ }
    };

    ws.onclose = () => {
      addBubble('Disconnected', 'system');
      doDisconnect();
    };

    ws.onerror = () => {
      addBubble('Connection error', 'system');
      doDisconnect();
      reject(new Error('WebSocket error'));
    };
  });
}

// ─── WebRTC mode ────────────────────────────────────────────────────────
async function connectWebRTC() {
  const base = document.getElementById('server-url').value.replace(/\/$/, '');
  const path = document.getElementById('rtc-path').value;
  const offerUrl = `${base}${path}/webrtc/offer`;
  const webrtcId = crypto.randomUUID?.() || Math.random().toString(36).substring(2, 10);

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    addBubble('Microphone access denied', 'system');
    throw err;
  }

  pc = new RTCPeerConnection();
  micStream.getTracks().forEach(track => pc.addTrack(track, micStream));

  // Mic analyser for visualization — use a cloned stream because Chrome
  // silences MediaStreamSourceNode when the original track is added to
  // a RTCPeerConnection.
  micAnalyserStream = micStream.clone();
  const analyserStream = micAnalyserStream;
  const micSource = audioCtx.createMediaStreamSource(analyserStream);
  micAnalyser = audioCtx.createAnalyser();
  micAnalyser.fftSize = 64;
  micSource.connect(micAnalyser);
  const micSilentGain = audioCtx.createGain();
  micSilentGain.gain.value = 0;
  micAnalyser.connect(micSilentGain);
  micSilentGain.connect(audioCtx.destination);

  // Data channel for transcriptions and JSON messages
  dc = pc.createDataChannel('text');
  dc.onmessage = (event) => {
    try {
      handleServerMessage(JSON.parse(event.data));
    } catch { /* ignore non-JSON */ }
  };

  // Receive remote audio tracks
  pc.ontrack = (event) => {
    console.log('[ontrack] kind=', event.track.kind, 'streams=', event.streams.length,
      'track.readyState=', event.track.readyState);
    let stream;
    if (event.streams && event.streams[0]) {
      stream = event.streams[0];
    } else {
      stream = new MediaStream([event.track]);
    }
    // Play remote audio via <audio> element (most reliable for WebRTC)
    const audio = document.createElement('audio');
    audio.srcObject = stream;
    audio.autoplay = true;
    audio.playsInline = true;
    audio.play().catch(e => console.warn('[ontrack] audio.play() error:', e));
    // Keep references to prevent GC
    if (!pc._remoteAudio) pc._remoteAudio = [];
    pc._remoteAudio.push(audio);
    console.log('[ontrack] remote audio → <audio> element');
  };

  // ICE candidates
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      fetch(offerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ candidate: candidate.toJSON(), webrtc_id: webrtcId, type: 'ice-candidate' }),
      });
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') {
      setState('listening');
    } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      addBubble('Connection lost', 'system');
      doDisconnect();
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const resp = await fetch(offerUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sdp: offer.sdp, type: offer.type, webrtc_id: webrtcId }),
  });
  const answer = await resp.json();
  if (answer.status === 'failed') {
    addBubble('Server rejected connection', 'system');
    throw new Error('Server rejected');
  }
  await pc.setRemoteDescription(answer);
}

// ─── Audio visualizer loop ──────────────────────────────────────────────
function startVisualizerLoop() {
  const bars = document.querySelectorAll('.bar');
  const freqData = new Uint8Array(32);

  function tick() {
    animFrameId = requestAnimationFrame(tick);

    let analyser = null;
    if (currentState === 'listening' && micAnalyser) analyser = micAnalyser;
    else if (currentState === 'speaking' && agentAnalyser) analyser = agentAnalyser;

    if (!analyser) return;

    analyser.getByteFrequencyData(freqData);

    // Map 32 frequency bins to 7 bars (pick representative bins)
    const indices = [1, 3, 5, 8, 11, 14, 18];
    for (let i = 0; i < 7; i++) {
      const val = freqData[indices[i]] || 0;
      // Map 0-255 to 6px-70px
      const height = 6 + (val / 255) * 64;
      bars[i].style.height = height + 'px';
    }
  }

  tick();
}

// ─── Transcript ─────────────────────────────────────────────────────────
let interimEl = null;
let userInterimEl = null;
let assistantAccum = '';  // accumulated text for current assistant turn

function hideEmptyMessage() {
  const empty = document.getElementById('transcript-empty');
  if (empty) empty.style.display = 'none';
}

function addBubble(text, role, speakerName) {
  hideEmptyMessage();
  const transcript = document.getElementById('transcript');
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-' + role;

  const label = document.createElement('div');
  label.className = 'bubble-label';
  if (speakerName) {
    label.textContent = speakerName;
  } else if (role === 'user') {
    label.textContent = 'You';
  } else if (role === 'assistant') {
    label.textContent = 'Assistant';
  }
  if (label.textContent) bubble.appendChild(label);

  const content = document.createElement('span');
  content.textContent = text;
  bubble.appendChild(content);

  transcript.appendChild(bubble);
  bubble.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function updateUserInterim(text) {
  hideEmptyMessage();
  const transcript = document.getElementById('transcript');
  if (!userInterimEl) {
    userInterimEl = document.createElement('div');
    userInterimEl.className = 'bubble bubble-user bubble-interim';
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = 'You';
    userInterimEl.appendChild(label);
    const content = document.createElement('span');
    userInterimEl.appendChild(content);
    transcript.appendChild(userInterimEl);
  }
  userInterimEl.querySelector('span').textContent = text;
  userInterimEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function finalizeUserBubble() {
  if (userInterimEl) {
    userInterimEl.classList.remove('bubble-interim');
    userInterimEl = null;
  }
}

function ensureAssistantBubble() {
  hideEmptyMessage();
  if (!interimEl) {
    const transcript = document.getElementById('transcript');
    interimEl = document.createElement('div');
    interimEl.className = 'bubble bubble-assistant';
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = 'Assistant';
    interimEl.appendChild(label);
    const content = document.createElement('span');
    interimEl.appendChild(content);
    transcript.appendChild(interimEl);
    assistantAccum = '';
  }
}

function appendAssistantChunk(text) {
  ensureAssistantBubble();
  // Non-final chunks are individual pieces — accumulate them
  assistantAccum += (assistantAccum ? ' ' : '') + text;
  interimEl.querySelector('span').textContent = assistantAccum;
  interimEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function setAssistantText(text) {
  ensureAssistantBubble();
  // Final has the full concatenated text — replace accumulated chunks
  assistantAccum = text;
  interimEl.querySelector('span').textContent = text;
  interimEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function finalizeAssistantBubble() {
  if (interimEl) {
    interimEl = null;
    assistantAccum = '';
  }
}
</script>
