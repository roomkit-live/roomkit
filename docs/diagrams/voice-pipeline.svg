<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 340">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1e1e1e; }
  .ts { font-size: 12px; fill: #666; }
  .arr { stroke: #888; stroke-width: 1.5; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple > .ts { fill: #534AB7; }
  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal > .th { fill: #085041; } .c-teal > .ts { fill: #0F6E56; }
  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; } .c-coral > .th { fill: #712B13; }
  .c-blue > rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue > .ts { fill: #185FA5; }
  .c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray > .ts { fill: #5F5E5A; }
  .box { fill: none; stroke: #B4B2A9; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e5e5e5; } .ts { fill: #a0a0a0; } .arr { stroke: #777; }
    .c-purple > rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple > .ts { fill: #CECBF6; }
    .c-teal > rect { fill: #085041; stroke: #5DCAA5; } .c-teal > .th { fill: #E1F5EE; } .c-teal > .ts { fill: #9FE1CB; }
    .c-coral > rect { fill: #712B13; stroke: #F0997B; } .c-coral > .th { fill: #FAECE7; }
    .c-blue > rect { fill: #0C447C; stroke: #85B7EB; } .c-blue > .ts { fill: #B5D4F4; }
    .c-gray > rect { fill: #444441; stroke: #B4B2A9; } .c-gray > .ts { fill: #D3D1C7; }
    .box { stroke: #5F5E5A; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect class="box" x="40" y="25" width="600" height="130" rx="16" stroke-dasharray="6 3" stroke-width="0.5"/>
