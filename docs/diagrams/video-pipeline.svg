<line x1="280" y1="179" x2="292" y2="179" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="295" y="165" width="100" height="28" rx="8" stroke-width="0.5"/><text class="ts" x="345" y="182" text-anchor="middle" dominant-baseline="central">Video frames</text></g>
<line x1="395" y1="179" x2="407" y2="179" class="arr" marker-end="url(#arrow)"/>
