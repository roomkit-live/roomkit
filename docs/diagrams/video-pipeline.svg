<line x1="488" y1="80" x2="500" y2="80" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="503" y="58" width="60" height="44" rx="8" stroke-width="0.5"/><text class="ts" x="533" y="80" text-anchor="middle" dominant-baseline="central">Vision</text></g>
<line x1="563" y1="80" x2="575" y2="80" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="578" y="58" width="52" height="44" rx="8" stroke-width="0.5"/><text class="ts" x="604" y="80" text-anchor="middle" dominant-baseline="central">Taps</text></g>
<rect class="box" x="40" y="130" width="600" height="70" rx="16" stroke-dasharray="6 3" stroke-width="0.5"/>
