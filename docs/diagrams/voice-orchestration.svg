<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 130">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1e1e1e; }
  .ts { font-size: 12px; fill: #666; }
  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal > .th { fill: #085041; } .c-teal > .ts { fill: #0F6E56; }
  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; } .c-coral > .th { fill: #712B13; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple > .th { fill: #3C3489; }
  .c-blue > rect { fill: #E6F1FB; stroke: #185FA5; } .c-blue > .th { fill: #0C447C; }
  .c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray > .th { fill: #444441; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e5e5e5; } .ts { fill: #a0a0a0; }
    .c-teal > rect { fill: #085041; stroke: #5DCAA5; } .c-teal > .th { fill: #E1F5EE; } .c-teal > .ts { fill: #9FE1CB; }
    .c-coral > rect { fill: #712B13; stroke: #F0997B; } .c-coral > .th { fill: #FAECE7; }
    .c-purple > rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple > .th { fill: #EEEDFE; }
    .c-blue > rect { fill: #0C447C; stroke: #85B7EB; } .c-blue > .th { fill: #E6F1FB; }
    .c-gray > rect { fill: #444441; stroke: #B4B2A9; } .c-gray > .th { fill: #F1EFE8; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="40" y="15" width="90" height="38" rx="8" stroke-width="0.5"/><text class="th" x="85" y="34" text-anchor="middle" dominant-baseline="central">SIP call</text></g>
<line x1="130" y1="34" x2="147" y2="34" stroke="#0F6E56" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="152" y="10" width="130" height="48" rx="8" stroke-width="0.5"/><text class="th" x="217" y="27" text-anchor="middle" dominant-baseline="central">VoiceChannel</text><text class="ts" x="217" y="45" text-anchor="middle" dominant-baseline="central">STT</text></g>
<line x1="282" y1="34" x2="305" y2="34" stroke="#0F6E56" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="294" y="24" text-anchor="middle">transcript</text>
<g class="c-purple"><rect x="310" y="15" width="100" height="38" rx="8" stroke-width="0.5"/><text class="th" x="360" y="34" text-anchor="middle" dominant-baseline="central">Router</text></g>
<line x1="410" y1="34" x2="433" y2="34" stroke="#534AB7" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="438" y="15" width="120" height="38" rx="8" stroke-width="0.5"/><text class="th" x="498" y="34" text-anchor="middle" dominant-baseline="central">Active agent</text></g>
<path d="M498 53 L498 90 L217 90 L217 58" fill="none" stroke="#185FA5" stroke-width="0.5" marker-end="url(#arrow)"/>
<text class="ts" x="358" y="82" text-anchor="middle">text response</text>
<g class="c-teal"><rect x="152" y="68" width="130" height="48" rx="8" stroke-width="0.5"/><text class="th" x="217" y="85" text-anchor="middle" dominant-baseline="central">VoiceChannel</text><text class="ts" x="217" y="103" text-anchor="middle" dominant-baseline="central">TTS</text></g>
<line x1="152" y1="92" x2="135" y2="92" stroke="#0F6E56" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="40" y="73" width="90" height="38" rx="8" stroke-width="0.5"/><text class="th" x="85" y="92" text-anchor="middle" dominant-baseline="central">Speaker</text></g>
</svg>
