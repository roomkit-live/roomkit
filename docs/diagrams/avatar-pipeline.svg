<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 140">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1e1e1e; }
  .ts { font-size: 12px; fill: #666; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; } .c-purple > .th { fill: #3C3489; }
  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; } .c-teal > .th { fill: #085041; } .c-teal > .ts { fill: #0F6E56; }
