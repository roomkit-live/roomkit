<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 420">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1e1e1e; }
  .ts { font-size: 12px; fill: #666; }
  .arr { stroke: #888; stroke-width: 1.5; }
  /* Purple ramp */
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > .th { fill: #3C3489; }
  .c-purple > .ts { fill: #534AB7; }
  /* Teal ramp */
  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > .th { fill: #085041; }
  .c-teal > .ts { fill: #0F6E56; }
  /* Coral ramp */
  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > .th { fill: #712B13; }
  .c-coral > .ts { fill: #993C1D; }
  /* Blue ramp */
  .c-blue > rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > .th { fill: #0C447C; }
  .c-blue > .ts { fill: #185FA5; }
  /* Amber ramp */
  .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > .th { fill: #633806; }
  .c-amber > .ts { fill: #854F0B; }
  /* Gray ramp */
  .c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray > .th { fill: #444441; }
  .c-gray > .ts { fill: #5F5E5A; }
  /* Dashed container */
  .box { fill: none; stroke: #B4B2A9; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e5e5e5; }
    .ts { fill: #a0a0a0; }
    .arr { stroke: #777; }
    .c-purple > rect { fill: #3C3489; stroke: #AFA9EC; } .c-purple > .th { fill: #EEEDFE; } .c-purple > .ts { fill: #CECBF6; }
    .c-teal > rect { fill: #085041; stroke: #5DCAA5; } .c-teal > .th { fill: #E1F5EE; } .c-teal > .ts { fill: #9FE1CB; }
    .c-coral > rect { fill: #712B13; stroke: #F0997B; } .c-coral > .th { fill: #FAECE7; } .c-coral > .ts { fill: #F5C4B3; }
    .c-blue > rect { fill: #0C447C; stroke: #85B7EB; } .c-blue > .th { fill: #E6F1FB; } .c-blue > .ts { fill: #B5D4F4; }
    .c-amber > rect { fill: #633806; stroke: #EF9F27; } .c-amber > .th { fill: #FAEEDA; } .c-amber > .ts { fill: #FAC775; }
    .c-gray > rect { fill: #444441; stroke: #B4B2A9; } .c-gray > .th { fill: #F1EFE8; } .c-gray > .ts { fill: #D3D1C7; }
    .box { stroke: #5F5E5A; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple">
<rect x="40" y="20" width="600" height="380" rx="20" stroke-width="0.5"/>
<text class="th" x="340" y="50" text-anchor="middle">Room</text>
</g>
<g class="c-gray">
<rect x="70" y="75" width="120" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="130" y="97" text-anchor="middle" dominant-baseline="central">Inbound</text>
</g>
<line x1="190" y1="97" x2="220" y2="97" class="arr" marker-end="url(#arrow)"/>
<g class="c-amber">
<rect x="225" y="75" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="295" y="97" text-anchor="middle" dominant-baseline="central">Hook pipeline</text>
</g>
<line x1="365" y1="97" x2="395" y2="97" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple">
<rect x="400" y="70" width="160" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="480" y="88" text-anchor="middle" dominant-baseline="central">Router</text>
<text class="ts" x="480" y="108" text-anchor="middle" dominant-baseline="central">Active agent dispatch</text>
</g>
<line x1="480" y1="126" x2="480" y2="155" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="495" y="145">broadcast</text>
<g class="c-teal">
<rect x="70" y="165" width="140" height="80" rx="12" stroke-width="0.5"/>
<text class="th" x="140" y="190" text-anchor="middle" dominant-baseline="central">Transport</text>
<text class="ts" x="140" y="210" text-anchor="middle" dominant-baseline="central">SMS, Email, WS</text>
<text class="ts" x="140" y="228" text-anchor="middle" dominant-baseline="central">Teams, Telegram</text>
</g>
<g class="c-teal">
<rect x="230" y="165" width="140" height="80" rx="12" stroke-width="0.5"/>
<text class="th" x="300" y="190" text-anchor="middle" dominant-baseline="central">Messaging</text>
<text class="ts" x="300" y="210" text-anchor="middle" dominant-baseline="central">WhatsApp, RCS</text>
<text class="ts" x="300" y="228" text-anchor="middle" dominant-baseline="central">Messenger, HTTP</text>
</g>
<g class="c-coral">
<rect x="390" y="165" width="110" height="80" rx="12" stroke-width="0.5"/>
<text class="th" x="445" y="190" text-anchor="middle" dominant-baseline="central">Voice</text>
<text class="ts" x="445" y="210" text-anchor="middle" dominant-baseline="central">STT / TTS</text>
<text class="ts" x="445" y="228" text-anchor="middle" dominant-baseline="central">Video / SIP</text>
</g>
<g class="c-blue">
<rect x="520" y="165" width="100" height="80" rx="12" stroke-width="0.5"/>
<text class="th" x="570" y="190" text-anchor="middle" dominant-baseline="central">AI agent</text>
<text class="ts" x="570" y="210" text-anchor="middle" dominant-baseline="central">Claude, GPT</text>
<text class="ts" x="570" y="228" text-anchor="middle" dominant-baseline="central">Gemini, vLLM</text>
</g>
<g class="c-gray">
<rect x="70" y="280" width="130" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="135" y="302" text-anchor="middle" dominant-baseline="central">Store</text>
</g>
<g class="c-gray">
<rect x="220" y="280" width="130" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="285" y="302" text-anchor="middle" dominant-baseline="central">Orchestration</text>
</g>
<g class="c-gray">
<rect x="370" y="280" width="130" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="435" y="302" text-anchor="middle" dominant-baseline="central">Telemetry</text>
</g>
<g class="c-gray">
<rect x="520" y="280" width="100" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="570" y="302" text-anchor="middle" dominant-baseline="central">Identity</text>
</g>
<text class="ts" x="340" y="365" text-anchor="middle">Hooks, resilience (retry, circuit breaker, rate limit), room lifecycle, MCP tools</text>
</svg>
