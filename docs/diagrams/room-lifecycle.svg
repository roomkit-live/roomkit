<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 100">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1e1e1e; }
  .ts { font-size: 12px; fill: #666; }
  .c-green > rect { fill: #EAF3DE; stroke: #3B6D11; } .c-green > .th { fill: #27500A; }
  .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; } .c-amber > .th { fill: #633806; }
  .c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; } .c-gray > .th { fill: #444441; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e5e5e5; } .ts { fill: #a0a0a0; }
    .c-green > rect { fill: #27500A; stroke: #97C459; } .c-green > .th { fill: #EAF3DE; }
    .c-amber > rect { fill: #633806; stroke: #EF9F27; } .c-amber > .th { fill: #FAEEDA; }
    .c-gray > rect { fill: #444441; stroke: #B4B2A9; } .c-gray > .th { fill: #F1EFE8; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-green"><rect x="80" y="38" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="140" y="60" text-anchor="middle" dominant-baseline="central">Active</text></g>
<text class="ts" x="234" y="24" text-anchor="middle">inactive timeout</text>
<line x1="200" y1="60" x2="268" y2="60" stroke="#854F0B" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<g class="c-amber"><rect x="273" y="38" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="333" y="60" text-anchor="middle" dominant-baseline="central">Paused</text></g>
<text class="ts" x="430" y="24" text-anchor="middle">closed timeout</text>
<line x1="393" y1="60" x2="468" y2="60" stroke="#5F5E5A" stroke-width="0.5" fill="none" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="473" y="38" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="533" y="60" text-anchor="middle" dominant-baseline="central">Closed</text></g>
</svg>
