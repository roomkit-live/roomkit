repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^examples/test-click\.py$
      - id: ruff-format
        exclude: ^examples/test-click\.py$
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        args: [-r, -c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
