[[tool.mypy.overrides]]
module = ["qwen_tts", "qwen_tts.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["qwen_asr", "qwen_asr.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["neutts", "neutts.*"]
