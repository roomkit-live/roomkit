[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roomkit"
dynamic = ["version"]
description = "Pure async Python library for multi-channel conversations"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Sylvain Boily", email = "sylvainboilydroid@gmail.com" }]
keywords = ["async", "multi-channel", "chat", "voice", "sms", "rcs", "whatsapp", "ai", "rooms"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications",
    "Topic :: Communications :: Chat",
    "Typing :: Typed",
]
dependencies = ["pydantic>=2.9"]

[project.optional-dependencies]
httpx = ["httpx>=0.27"]
anthropic = ["anthropic>=0.30"]
openai = ["openai>=2.28"]
azure = ["openai>=2.28"]
vllm = ["openai>=2.28"]
gemini = ["google-genai>=1.0.0"]
mistral = ["mistralai>=1.0"]
deepgram = ["deepgram-sdk>=6.0.0"]
sherpa-onnx = ["sherpa-onnx>=1.10"]
elevenlabs = ["elevenlabs>=1.0"]
qwen-tts = ["qwen-tts>=0.1"]
qwen-asr = ["qwen-asr>=0.0.4"]
neutts = ["neutts>=0.1"]
fastrtc = ["fastrtc>=0.0.18", "numpy>=1.26"]
aicoustics = ["aic-sdk>=2.1"]
webrtc-aec = ["aec-audio-processing>=0.1"]
local-audio = ["sounddevice>=0.4", "numpy>=1.26"]
local-video = ["opencv-python-headless>=4.8"]
screen-capture = ["mss>=9.0"]
screen-input = ["pyautogui>=0.9"]
anam = ["anam>=0.1", "av>=12.0.0", "numpy>=1.26"]
video = ["av>=12.0.0", "numpy>=1.26"]
video-overlay = ["Pillow>=10.0"]
yolo = ["ultralytics>=8.3"]
rtp = ["aiortp>=0.3.1"]
sip = ["aiosipua[rtp]>=0.4.1"]
webtransport = ["aioquic>=1.0"]
twilio = ["twilio>=9.0"]
phonenumbers = ["phonenumbers>=8.13"]
pynacl = ["pynacl>=1.5"]
realtime-openai = ["openai>=2.28", "websockets>=13.0"]
realtime-gemini = ["google-genai>=1.0.0"]
realtime-elevenlabs = ["elevenlabs>=2.40"]
websocket = ["websockets>=13.0"]
sse = ["httpx>=0.27", "httpx-sse>=0.4"]
gradium = ["gradium>=0.5.7"]
opentelemetry = ["opentelemetry-api>=1.20", "opentelemetry-sdk>=1.20"]
pyroscope = ["pyroscope-io>=1.0"]
smart-turn = ["numpy>=1.26", "onnxruntime", "transformers"]
telegram = ["httpx>=0.27"]
teams = ["botbuilder-core>=4.14"]
whatsapp-personal = ["neonize>=0.3.14"]
postgres = ["asyncpg>=0.29"]
redis = ["redis>=5.0"]
mcp = ["mcp>=1.0"]
sources = [
    "roomkit[websocket]",
    "roomkit[sse]",
    "roomkit[whatsapp-personal]",
]
providers = [
    "roomkit[httpx]",
    "roomkit[anthropic]",
    "roomkit[openai]",
    "roomkit[vllm]",
    "roomkit[gemini]",
    "roomkit[mistral]",
    "roomkit[twilio]",
    "roomkit[telegram]",
    "roomkit[teams]",
    "roomkit[gradium]",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "mypy>=1.11",
    "ruff>=0.6",
    "bandit>=1.7",
    "pre-commit>=3.8",
    "roomkit[providers]",
    "roomkit[phonenumbers]",
    "roomkit[pynacl]",
    "roomkit[sources]",
    "roomkit[docs]",
    "roomkit[postgres]",
]
all = [
    "roomkit[providers]",

    "roomkit[whatsapp-personal]",
]

[project.urls]
Homepage = "https://roomkit.live"
Documentation = "https://www.roomkit.live/docs/"
Repository = "https://github.com/roomkit-live/roomkit"
Issues = "https://github.com/roomkit-live/roomkit/issues"

[tool.hatch.version]
path = "src/roomkit/_version.py"

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "/AGENTS.md",
    "/llms.txt",
    "/llms-full.txt",
    "/README.md",
    "/LICENSE",
]

[tool.hatch.build.targets.wheel]
packages = ["src/roomkit"]
artifacts = [
    "*.md",
    "*.txt",
]

[tool.hatch.build.targets.wheel.force-include]
"AGENTS.md" = "roomkit/AGENTS.md"
"llms.txt" = "roomkit/llms.txt"
"llms-full.txt" = "roomkit/llms-full.txt"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
filterwarnings = [
    "error",
    "ignore:connect_voice\\(\\) is deprecated:DeprecationWarning",
    "ignore:disconnect_voice\\(\\) is deprecated:DeprecationWarning",
    "ignore:connect_video\\(\\) is deprecated:DeprecationWarning",
    "ignore:disconnect_video\\(\\) is deprecated:DeprecationWarning",
    "ignore:bind_voice_session\\(\\) is deprecated:DeprecationWarning",
    "ignore:connect_voice\\(auto_greet=True\\) is deprecated:DeprecationWarning",
    "ignore:connect_realtime_voice\\(\\) is deprecated:DeprecationWarning",
    "ignore:disconnect_realtime_voice\\(\\) is deprecated:DeprecationWarning",
    "ignore::ResourceWarning",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["opentelemetry", "opentelemetry.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["google", "google.genai", "google.genai.*"]
ignore_missing_imports = true

