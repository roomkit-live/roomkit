name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Bandit
        run: uv run bandit -r src/ -c pyproject.toml

  audit:
    name: Dependency audit (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      # Audit the CORE runtime dependencies only (blocking). Optional extras
      # pull heavier transitive trees and are kept current by Dependabot, so
      # auditing them here would keep the gate permanently red without adding
      # signal for the base install.
      - name: Export core runtime dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements-core.txt

      - name: pip-audit (core runtime dependencies)
        run: uvx pip-audit --requirement requirements-core.txt

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ty
        run: uv run ty check src/roomkit/

  smoke:
    name: Smoke test (quickstart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install base package only
        run: uv venv && uv pip install .

      - name: Install pytest
        run: uv pip install pytest pytest-asyncio

      - name: Run smoke test
        run: uv run pytest tests/test_smoke_quickstart.py -v

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # Runs the tests that need real infrastructure — they self-skip in the fast
  # `test` job (no POSTGRES_DSN / no fastapi). This proves the Postgres store,
  # the multi-process index safety (UNIQUE + advisory locks), and the WebRTC
  # auth path against real dependencies.
  integration:
    name: Integration (real Postgres + WebRTC)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: roomkit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/roomkit_test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra postgres

      # fastapi is a peer dep (WebRTC signaling). `uv run --with` resolves it
      # against the project's locked deps, keeping a starlette/httpx combo that
      # works — `uv pip install fastapi` can pull an incompatible newer stack.
      - name: Run integration tests
        run: >-
          uv run --with fastapi pytest -v
          tests/test_store_postgres.py
          tests/test_postgres_multiprocess.py
          tests/test_webrtc_offer_auth.py
