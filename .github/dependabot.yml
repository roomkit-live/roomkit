version: 2
updates:
  # Python dependencies (core + extras) via uv.lock / pyproject.toml.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-deps:
        patterns: ["*"]
    # Candidates that upstream constraints make unresolvable — attempting them
    # fails the whole run with dependency_file_not_resolvable. Revisit when the
    # named upstream loosens its pin.
    ignore:
      # aiortc (<=1.15.0) requires av<18 — drop when aiortc supports av 18.
      - dependency-name: "av"
        versions: [">=18.0.0"]
      # mistralai pins opentelemetry-semantic-conventions<0.61, which locks the
      # OpenTelemetry line to 1.39.x.
      - dependency-name: "opentelemetry-api"
        versions: [">=1.40.0"]
      - dependency-name: "opentelemetry-sdk"
        versions: [">=1.40.0"]
      # Version dictated by the TTS extras' exact pins (qwen-tts pins
      # transformers==4.57.3; the lockfile forks via tool.uv.conflicts).
      - dependency-name: "transformers"
      # Dependabot's uv updater crashes ("Declaration not found for numpy!")
      # rewriting our multiple numpy declarations (capped <2.5 in fastrtc for
      # numba/librosa, uncapped elsewhere). Bump numpy manually via uv lock.
      - dependency-name: "numpy"

  # Keep GitHub Actions pinned versions current (security patches).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
